version: '3'

services:
  word_cloud:
    container_name: word_cloud
    build:
        context: ./build/
        dockerfile: dockerfile
    image: word_cloud:uwsgi-nginx-flask-py3.8
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "1g"
    environment:
      TZ: "Asia/Taipei"
      LANG: C.UTF-8
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 5s
      retries: 5
      timeout: 3s
    sysctls:
      net.core.somaxconn: 1024
    volumes:
      - ./src:/app
      - /etc/localtime:/etc/localtime:ro
    ports:
      - 55056:80
